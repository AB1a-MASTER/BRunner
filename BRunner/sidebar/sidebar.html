<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BRunner Sidebar</title>
    <style>
        /* ==========================================
       1. GLOBAL & LAYOUT BASE
       ========================================== */
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Hide the entire body if studio view is active */
        html.studio-active body {
            display: none;
        }


        /* ==========================================
       2. PRIMARY LAYOUT COMPONENTS
       ========================================== */
        .header {
            padding: 15px;
            background: #1e293b;
            border-bottom: 1px solid #334155;
        }

        .header h3 {
            margin: 0 0 10px 0;
            color: #3b82f6;
        }

        .search-box {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 4px;
        }

        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }

        .footer {
            padding: 15px;
            background: #1e293b;
            border-top: 1px solid #334155;
        }


        /* ==========================================
       3. WORKFLOW CARDS & LIST ITEMS
       ========================================== */
        .workflow-item {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #111827;
            color: #f8fafc;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            text-align: left;
            box-sizing: border-box;
        }

        .workflow-launch {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-panel, #111827);
            color: var(--text-main, #f8fafc);
            border: 1px solid var(--border, #334155);
            border-radius: 8px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            text-align: left;
        }

        .workflow-info {
            min-width: 0;
            flex: 1;
        }

        .workflow-name {
            font-size: 0.85rem;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .workflow-file {
            font-size: 0.68rem;
            color: #94a3b8;
            margin-top: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }


        /* ==========================================
       4. INTERACTIVE BUTTONS & CONTROLS
       ========================================== */
        .btn-play {
            width: 100%;
            padding: 10px;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.5;
            pointer-events: none;
        }

        .btn-record {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .workflow-run-btn {
            margin-left: 8px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }

        .workflow-run {
            opacity: 0.8;
            margin-left: 8px;
        }

        .selected-label {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 5px;
        }


        /* ==========================================
       5. HOVER, ACTIVE, & DYNAMIC STATES
       ========================================== */
        /* Hover Effects */
        .workflow-item:hover {
            border-color: #3b82f6;
        }

        .workflow-launch:hover {
            border-color: var(--accent, #3b82f6);
        }

        .workflow-run-btn:hover {
            background: #1d4ed8;
        }

        .workflow-run-btn.running {
            background: #dc2626;
        }

        .workflow-run-btn.stopping,
        .workflow-run-btn:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        /* Active States */
        .btn-play.active {
            opacity: 1;
            pointer-events: auto;
        }

        .btn-play.active:hover {
            background: #059669;
        }

        .workflow-item.selected {
            border-color: #22c55e;
            background: #0f172a;
        }

        #btn-toggle-record.recording {
            background: #111827;
            border: 1px solid #ef4444;
            color: #ef4444;
        }

        /* Status Notifications */
        .empty-state.error,
        #status-text
    </style>
</head>

<body>
    <div id="main-sidebar-view" style="display: flex; flex-direction: column; height: 100vh; width: 100%;">
        <div class="header">
            <h3>BRunner Controls</h3>
            <button id="btn-open-studio"
                style="width: 100%; padding: 8px; margin-bottom: 10px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">🛠️
                Open Studio IDE</button>

            <input type="text" id="search-input" class="search-box" placeholder="Search workflows...">
        </div>

        <div class="list-container" id="workflow-list">
            <div style="color: #94a3b8; font-size: 0.8rem; text-align: center; margin-top: 20px;">Loading workflows...
            </div>
        </div>

        <div class="footer">
            <div class="selected-label" id="selected-label">No workflow selected</div>
            <select id="recording-tab-policy" title="Tabs followed while recording"
                style="width:100%;padding:7px;margin-bottom:8px;background:#0f172a;color:#e2e8f0;border:1px solid #334155;border-radius:4px;">
                <option value="openerDescendants">Follow opened tabs</option>
                <option value="activeTab">Follow active tab</option>
            </select>
            <button id="btn-play" class="btn-play">▶ Run Selected</button>
            <button id="btn-toggle-record" class="btn-record">🔴 Toggle Recording</button>
        </div>
    </div>

    <div id="studio-active-view"
        style="display: none; padding: 25px; font-family: system-ui, sans-serif; text-align: center; color: #94a3b8; background: #0f172a; height: 100vh; flex-direction: column; justify-content: center; align-items: center; box-sizing: border-box; width: 100%;">
        <div style="font-size: 2.5rem; margin-bottom: 15px;">🛠️</div>
        <h4 style="margin: 0 0 10px 0; color: #3b82f6;">Studio IDE Active</h4>
        <p style="font-size: 0.8rem; line-height: 1.4; margin: 0;">Sidebar controls are hidden while the full canvas is
            open to optimize your workspace layout.</p>
    </div>

    <script src="sidebar.js"></script>
</body>
