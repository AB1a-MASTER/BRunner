<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>BRunner Studio IDE</title>
    <link rel="stylesheet" href="../shared/studio-tokens.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="studio-command-bar">
        <div class="logo"><img class="studio-logo-icon" src="../icons/icon2.png" alt="">BRunner <span>Sequential Studio</span></div>
        <div id="connection-status" class="host-connection" role="status" aria-live="polite">
            <span class="host-dot" aria-hidden="true"></span>
            <span id="status-text" class="status-disconnected">Connecting...</span>
            <button id="btn-reconnect" class="micro-btn" title="Retry native host connection">Retry</button>
        </div>
        <div class="header-controls">
            <a class="graph-studio-link" href="../studio-graph/index.html" title="Open Graph Studio">Graph Studio</a>
            <label class="header-select-label" for="studio-density">View</label>
            <select id="studio-density" title="Change the display size in both Studios" aria-label="Studio display size">
                <option value="compact">Compact</option>
                <option value="comfortable">Comfortable</option>
                <option value="large">Large</option>
            </select>
            <span id="validation-status" class="validation-status" aria-live="polite">Valid</span>
            <select id="recording-tab-policy" title="Tabs followed while recording">
                <option value="openerDescendants">Follow opened tabs</option>
                <option value="activeTab">Follow active tab</option>
            </select>
            <button id="btn-record" class="danger-btn" title="Record browser actions">Record</button>
            <button id="btn-run" class="primary-btn" title="Run workflow">Run</button>
            <button id="btn-toggle-sidebar" class="secondary-btn" title="Hide workflow manager" aria-expanded="true">Manager</button>
        </div>
    </header>

    <main>
        <aside class="palette">
            <h3>Actions</h3>
            <div id="action-palette">
                <div class="empty-state">Loading actions...</div>
            </div>
        </aside>

        <section class="canvas" id="workflow-canvas">
            <div class="empty-state">Click an action on the left to start building.</div>
        </section>

        <aside class="workflow-manager" id="workflow-sidebar">
            <div class="manager-tabs" role="tablist" aria-label="Studio manager panels">
                <button id="tab-workflows" class="manager-tab active" role="tab" aria-selected="true" aria-controls="workflow-manager-panel">Workflows</button>
                <button id="tab-data" class="manager-tab" role="tab" aria-selected="false" aria-controls="data-inspector-panel">Data</button>
            </div>

            <section id="workflow-manager-panel" class="manager-panel" role="tabpanel" aria-labelledby="tab-workflows">
            <div class="manager-header">
                <label class="sr-only" for="workflow-name">Workflow name</label>
                <input type="text" id="workflow-name" placeholder="Workflow Name" value="Untitled">
                <label class="sr-only" for="workflow-domain">Bound domain</label>
                <input type="text" id="workflow-domain" placeholder="Bound Domain (e.g. github.com)">
                <label class="sr-only" for="workflow-description">Workflow description</label>
                <textarea id="workflow-description" placeholder="Workflow description"></textarea>
                <label class="manager-checkbox">
                    <input type="checkbox" id="workflow-reuse-tabs">
                    Reuse an already-open matching tab
                </label>
            </div>

            <div class="manager-toolbar">
                <button id="btn-new" class="icon-btn" title="Create a new workflow">New</button>
                <button id="btn-save" class="icon-btn" title="Save workflow changes">Save Changes</button>
                <button id="btn-refresh" class="icon-btn" title="Refresh saved workflows">Refresh</button>
            </div>

            <div class="workflow-list" id="workflow-list">
                <div class="empty-state" style="font-size: 0.8rem; margin-top: 1rem;">
                    Click Refresh to load OS files.
                </div>
            </div>
            </section>

            <section id="data-inspector-panel" class="manager-panel data-inspector" role="tabpanel" aria-labelledby="tab-data" hidden>
                <div class="data-inspector-header">
                    <div>
                        <h3>Variables</h3>
                        <p id="data-inspector-summary">No variables available</p>
                    </div>
                    <span id="data-inspector-count" class="data-count">0</span>
                </div>
                <label class="sr-only" for="data-inspector-search">Search variables</label>
                <input id="data-inspector-search" class="data-search" type="search" placeholder="Search name, type, or origin">
                <div id="data-inspector-list" class="data-inspector-list" aria-live="polite">
                    <div class="empty-state data-empty">Run a workflow or load seed variables.</div>
                </div>
            </section>
        </aside>
    </main>

    <script type="module" src="preferences.js"></script>
    <script src="studioValidation.js"></script>
    <script src="app.js"></script>
</body>

</html>
